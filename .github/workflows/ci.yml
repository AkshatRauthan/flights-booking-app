name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'

jobs:
  lint-and-test:
    name: Lint & Test
    runs-`on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: testpassword
          MYSQL_DATABASE: flights_test_db
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    strategy:
      matrix:
        service:
          - API-Gateway
          - Flights-Booking-Service
          - Flights-Creation-Service
          - Flights-Searching-Service
          - Notifications-Service

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: ${{ matrix.service }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ matrix.service }}
        run: npm ci

      - name: Run tests
        working-directory: ${{ matrix.service }}
        run: npm test -- --coverage --forceExit
        env:
          NODE_ENV: test
          JWT_SECRET: test-jwt-secret
          SALT_ROUNDS: 8
          PORT: 3001
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          RABBITMQ_HOST: amqp://localhost
          INTERNAL_SERVICE_TOKEN_KEY: test-internal-key
          DB_HOST: localhost
          DB_USERNAME: root
          DB_PASSWORD: testpassword
          DB_NAME: flights_test_db

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.service }}
          path: ${{ matrix.service }}/coverage/
          retention-days: 5

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.ref == 'refs/heads/main'

    strategy:
      matrix:
        service:
          - API-Gateway
          - Flights-Booking-Service
          - Flights-Creation-Service
          - Flights-Searching-Service
          - Notifications-Service

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        working-directory: ${{ matrix.service }}
        run: |
          docker build -t flights-app/${{ matrix.service }}:${{ github.sha }} .
          docker build -t flights-app/${{ matrix.service }}:latest .

  security-scan:
    name: Security Audit
    runs-on: ubuntu-latest

    strategy:
      matrix:
        service:
          - API-Gateway
          - Flights-Booking-Service
          - Flights-Creation-Service
          - Flights-Searching-Service
          - Notifications-Service

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        working-directory: ${{ matrix.service }}
        run: npm ci

      - name: Run npm audit
        working-directory: ${{ matrix.service }}
        run: npm audit --audit-level=high || true
        continue-on-error: true
